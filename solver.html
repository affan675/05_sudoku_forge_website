<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SudokuForge – Solver</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/loader.css">
    <link rel="stylesheet" href="css/cursor.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/sidebar.css">
</head>
<body>
    <div id="loader-overlay">
        <div class="loader-spinner"></div>
        <div class="loader-tip-box" id="tip-text">Loading tip...</div>
    </div>

    <div class="cursor" id="cursor-dot"></div>
    <div class="cursor-trail" id="cursor-trail"></div>

    <div class="app-container">
        <aside id="sidebar-container"></aside>
        <main class="main-content">
            <div class="solver-header">
                <h1>🤖 AI Sudoku Solver</h1>
                <p>Enter your unsolved puzzle (1-9) and let the backtracking algorithm do its magic.</p>
                <div class="action-buttons">
                    <button id="solve-btn" class="btn-primary">🧠 Solve</button>
                    <button id="clear-btn" class="btn-secondary">🗑️ Clear</button>
                </div>
                <div id="solver-message" class="message"></div>
            </div>

            <div class="sudoku-grid-container">
                <table id="solver-grid" class="sudoku-table">
                    <!-- Generated below -->
                </table>
            </div>
        </main>
    </div>

    <script src="components/sidebar.js"></script>
    <script src="js/main.js" defer></script>
    <script src="js/loader.js" defer></script>
    <script src="js/tab-switch.js" defer></script>
    <script src="js/cycle.js" defer></script>
    <script src="js/solve.js" defer></script>
    <script src="js/ai_solver.js" defer></script>
    <script src="js/creator.js" defer></script>
            <script>
        document.addEventListener('DOMContentLoaded', function () {
            const gridTable = document.getElementById('solver-grid');
            const solveBtn = document.getElementById('solve-btn');
            const clearBtn = document.getElementById('clear-btn');
            const messageDiv = document.getElementById('solver-message');

            function createEmptyGrid() {
                // editable = false → all cells are inputs, empty
                renderPuzzleGrid(gridTable, Array.from({ length: 9 }, () => Array(9).fill(0)), false);
            }

            // Check if a puzzle was sent from the Solve page
            const stored = localStorage.getItem('sudokuForge_puzzle');
            if (stored) {
                try {
                    const puzzle = JSON.parse(stored);
                    // Fill the grid (all cells become inputs with the given numbers)
                    renderPuzzleGrid(gridTable, puzzle, false);
                    // Clear storage so refreshing shows an empty grid
                    localStorage.removeItem('sudokuForge_puzzle');
                    messageDiv.textContent = '📋 Puzzle loaded from Solve page. Click "Solve" to see the solution.';
                } catch (e) {
                    createEmptyGrid();
                }
            } else {
                createEmptyGrid();
            }

            solveBtn.addEventListener('click', () => {
                // Read the puzzle the user entered
                const userGrid = readUserGrid(gridTable);
                const hasInput = userGrid.some(row => row.some(cell => cell !== 0));
                if (!hasInput) {
                    messageDiv.textContent = '⚠️ Please enter some numbers.';
                    return;
                }

                // Copy the grid so we don't modify the original
                const board = userGrid.map(row => [...row]);

                // Use the solver from solve.js (solveSudokuDirect)
                const success = solveSudokuDirect(board);

                if (success) {
                    // board now contains the solved puzzle
                    renderPuzzleGrid(gridTable, board, false);
                    messageDiv.textContent = '✅ Puzzle solved!';
                } else {
                    messageDiv.textContent = '❌ Unsolvable puzzle. Check your input.';
                }
            });

            clearBtn.addEventListener('click', () => {
                createEmptyGrid();
                messageDiv.textContent = '';
                localStorage.removeItem('sudokuForge_puzzle');
            });
        });
    </script>
</body>
</html>
